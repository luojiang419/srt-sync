name: asr_tools
description: "SenseVoice ASR 影视素材自动合板工具"
publish_to: 'none'
version: 1.1.16+34

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.8.1

  # 数据库
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.1
  path_provider: ^2.1.5

  # 文件选择
  file_picker: ^9.2.3

  # 窗口管理
  window_manager: ^0.5.1

  # 字体
  google_fonts: ^6.2.1

  # UUID
  uuid: ^4.5.1

  # 进程调用 (sherpa-onnx / ffmpeg)
  process_run: ^1.2.2

  # 加密 (缓存键)
  crypto: ^3.0.6

  # XML 导出
  xml: ^6.5.0
  desktop_drop: ^0.7.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
